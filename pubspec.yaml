name: ramro_postal_service
description: A new Flutter project.
publish_to: none
version: 1.0.3+21
environment:
    sdk: ^3.9.0
dependencies:
    cached_network_image: ^3.4.1
    carousel_slider: ^5.1.1
    change_app_package_name: ^1.5.0
    connectivity_plus: ^7.0.0
    cupertino_icons: ^1.0.8
    device_info_plus: ^12.3.0
    dio: ^5.9.0
    dotted_line: ^3.2.3
    expandable_bottom_sheet: ^1.1.1+1
    firebase_analytics: ^12.0.3
    firebase_auth: ^6.1.1
    firebase_core: ^4.2.0
    flutter:
        sdk: flutter
    flutter_html: ^3.0.0
    flutter_polyline_points: ^3.1.0
    flutter_rating_bar: ^4.0.1
    flutter_slidable: ^4.0.3
    flutter_spinkit: ^5.2.2
    flutter_staggered_animations: ^1.1.1
    flutter_svg: ^2.2.1
    fluttertoast: ^9.0.0
    geolocator: ^14.0.2
    get: ^4.7.2
    google_directions_api: ^0.10.0
    google_maps_flutter: ^2.13.1
    google_maps_utils: ^2.0.0+1
    grouped_list: ^6.0.0
    http: ^1.5.0
    image_picker: ^1.2.0
    intl: ^0.20.2
    label_marker: ^1.0.1
    location: ^8.0.1
    mobile_scanner: ^7.1.3
    onesignal_flutter: ^5.3.4
    path_provider: ^2.1.5
    pdf: ^3.11.3
    permission_handler: ^12.0.1
    pinput: ^5.0.2
    printing: ^5.14.2
    qr_flutter: ^4.1.0
    share_plus: ^12.0.1
    shared_preferences: ^2.5.3
    upgrader: ^12.1.0
    url_launcher: ^6.3.2
    vector_math: ^2.2.0
    vibration: ^3.1.4
dev_dependencies:
    flutter_lints: ^5.0.0
    flutter_test:
        sdk: flutter
flutter:
    uses-material-design: true
    fonts:
        -
            family: Montserrat
            fonts:
                -
                    asset: assets/fonts/montserrat.ttf
        -
            family: Roboto
            fonts:
                -
                    asset: assets/fonts/Roboto-Bold.ttf
                -
                    asset: assets/fonts/Roboto-Regular.ttf
        -
            family: SF Pro Display
            fonts:
                -
                    asset: assets/fonts/SFProDisplayBold.ttf
                    weight: 700
                -
                    asset: assets/fonts/SFProDisplayRegular.ttf
                    weight: 400
                -
                    asset: assets/fonts/SFProDisplaySemibold.ttf
                    weight: 600
                -
                    asset: assets/fonts/SFProDisplayMedium.ttf
                    weight: 500
    assets:
        - assets/banners/
        - assets/flag/
        - assets/icons/
        - assets/icons/svg/
        - assets/images/


  # To add assets to your application, add an assets section, like this:
  # assets:
  #  - images/a_dot_burr.jpeg
  #  - images/a_dot_ham.jpeg
      
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.
      
  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages
      
  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages